<!DOCTYPE html>
<html>
<head>
    <title>Lobby - F*ck You On About?</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<div class="page">
    <div class="topbar">
        <div>
            <div class="brand-pill">Lobby</div>
            <h1>F*ck You On About?</h1>
        </div>

        <div class="room-code-box">
            <div class="room-code" id="room-code">{{ room_code }}</div>
            <button onclick="copyRoomCode()">Copy</button>
        </div>
    </div>

    <div id="toast-area"></div>

    <div class="lobby-grid">
        <div class="lobby-left">
            <div class="card">
                <h2>Players</h2>
                <div id="players"></div>
            </div>

            <div class="card">
                <h2>Your Custom Prompts</h2>
                <p class="hint">Add up to 5 prompts. These can appear under the Custom Prompts category.</p>

                <input class="custom-prompt" placeholder="Prompt 1">
                <input class="custom-prompt" placeholder="Prompt 2">
                <input class="custom-prompt" placeholder="Prompt 3">
                <input class="custom-prompt" placeholder="Prompt 4">
                <input class="custom-prompt" placeholder="Prompt 5">

                <button onclick="submitCustomPrompts()">Save Prompts</button>
            </div>
        </div>

        <div class="card" id="host-settings">
            <h2>Game Setup</h2>

            <div class="settings-grid">
                <div>
                    <label>Turns</label>
                    <input id="turn_limit" type="number" value="3">
                </div>

                <div>
                    <label>Target Score</label>
                    <input id="target_score" type="number" value="20">
                </div>

                <div>
                    <label>Round Timer</label>
                    <input id="round_timer" type="number" value="60">
                </div>

                <div>
                    <label>Answer Timer</label>
                    <input id="answer_timer" type="number" value="10">
                </div>

                <div>
                    <label>Letter Reroll</label>
                    <input id="letter_reroll_seconds" type="number" value="20">
                </div>

                <div>
                    <label>Panic Uses</label>
                    <input id="panic_uses" type="number" value="1">
                </div>
            </div>

            <label class="check">
                <input type="checkbox" id="speaker_scores" checked>
                Speaker scores when guessed correctly
            </label>

            <label class="check">
                <input type="checkbox" id="sudden_death" checked>
                Sudden death if tied
            </label>

            <label class="check">
                <input type="checkbox" id="enable_custom_prompts" checked>
                Allow player custom prompts
            </label>

            <h3>Card Packs</h3>
            <div id="packs" class="categories"></div>

            <h3>Sound</h3>
            <label class="check">
                <input type="checkbox" id="sound_enabled" checked>
                Sound enabled
            </label>

            <input id="volume" type="range" min="0" max="1" step="0.05" value="0.6">

            <h3>Upload CSV Pack</h3>
            <p class="hint">CSV headers: Category,Topic</p>
            <input id="pack_name" placeholder="Pack name">
            <input id="pack_file" type="file" accept=".csv">
            <button onclick="uploadPack()">Upload</button>

            <hr>

            <button onclick="saveSettings()">Save Settings</button>
            <button onclick="startGame()">Start Game</button>
        </div>
    </div>
</div>

<script>
const socket = io();
let state = null;

socket.on("game_state", data => {
    state = data;
    renderLobby();
});

socket.on("go_to_game", data => {
    window.location.href = "/game/" + data.room_code;
});

socket.on("go_to_lobby", data => {
    window.location.href = "/lobby/" + data.room_code;
});

socket.on("toast", data => {
    showToast(data.message);
});

function renderLobby() {
    if (!state) return;

    renderPlayers();
    renderPacks();

    const isHost = state.you === state.host_id;
    document.getElementById("host-settings").style.display = isHost ? "block" : "none";

    if (isHost && state.settings) {
        document.getElementById("turn_limit").value = state.settings.turn_limit ?? 3;
        document.getElementById("target_score").value = state.settings.target_score ?? 20;
        document.getElementById("round_timer").value = state.settings.round_timer ?? 60;
        document.getElementById("answer_timer").value = state.settings.answer_timer ?? 10;
        document.getElementById("letter_reroll_seconds").value = state.settings.letter_reroll_seconds ?? 20;
        document.getElementById("panic_uses").value = state.settings.panic_uses ?? 1;
        document.getElementById("speaker_scores").checked = state.settings.speaker_scores !== false;
        document.getElementById("sudden_death").checked = state.settings.sudden_death !== false;
        document.getElementById("enable_custom_prompts").checked = state.settings.enable_custom_prompts !== false;
        document.getElementById("sound_enabled").checked = state.settings.sound_enabled !== false;
        document.getElementById("volume").value = state.settings.volume ?? 0.6;
    }
}

function renderPlayers() {
    const playersDiv = document.getElementById("players");
    playersDiv.innerHTML = "";

    state.players.forEach(p => {
        const row = document.createElement("div");
        row.className = "player-row";
        row.innerHTML = `
            <div class="player-left">
                <span class="avatar small" style="background:${p.colour}">${p.nickname[0].toUpperCase()}</span>
                <strong>${p.nickname}</strong>
                ${p.spectator ? "<em>Spectator</em>" : ""}
                ${!p.connected ? "<em>Disconnected</em>" : ""}
                ${p.custom_prompts_count ? `<em>${p.custom_prompts_count}/5 prompts</em>` : ""}
            </div>
            ${p.id === state.host_id ? "<span class='host-badge'>HOST</span>" : ""}
        `;
        playersDiv.appendChild(row);
    });
}

function renderPacks() {
    const packsDiv = document.getElementById("packs");
    packsDiv.innerHTML = "";

    state.packs.forEach(pack => {
        const enabled = state.settings.packs.includes(pack.id);

        const label = document.createElement("label");
        label.className = "check";
        label.innerHTML = `
            <input type="checkbox" class="pack" value="${pack.id}" ${enabled ? "checked" : ""}>
            ${pack.name} <small>(${pack.count})</small>
        `;
        packsDiv.appendChild(label);
    });
}

function saveSettings() {
    const packs = Array.from(document.querySelectorAll(".pack:checked")).map(c => c.value);

    socket.emit("update_settings", {
        turn_limit: document.getElementById("turn_limit").value,
        target_score: document.getElementById("target_score").value,
        round_timer: document.getElementById("round_timer").value,
        answer_timer: document.getElementById("answer_timer").value,
        letter_reroll_seconds: document.getElementById("letter_reroll_seconds").value,
        panic_uses: document.getElementById("panic_uses").value,
        speaker_scores: document.getElementById("speaker_scores").checked,
        sudden_death: document.getElementById("sudden_death").checked,
        enable_custom_prompts: document.getElementById("enable_custom_prompts").checked,
        packs: packs,
        sound_enabled: document.getElementById("sound_enabled").checked,
        volume: document.getElementById("volume").value
    });

    showToast("Settings saved");
}

function startGame() {
    saveSettings();
    socket.emit("start_game");
}

function submitCustomPrompts() {
    const prompts = Array.from(document.querySelectorAll(".custom-prompt"))
        .map(input => input.value.trim())
        .filter(Boolean);

    socket.emit("submit_custom_prompts", {prompts});
    showToast("Custom prompts saved");
}

function copyRoomCode() {
    const code = document.getElementById("room-code").innerText;
    navigator.clipboard.writeText(code);
    showToast("Room code copied");
}

function showToast(message) {
    const area = document.getElementById("toast-area");
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.innerText = message;
    area.appendChild(toast);

    setTimeout(() => toast.remove(), 2500);
}

async function uploadPack() {
    const name = document.getElementById("pack_name").value;
    const file = document.getElementById("pack_file").files[0];

    if (!file) {
        showToast("Choose a CSV file first");
        return;
    }

    const form = new FormData();
    form.append("pack_name", name || file.name.replace(".csv", ""));
    form.append("pack_file", file);

    const res = await fetch("/upload-pack", {
        method: "POST",
        body: form
    });

    const data = await res.json();

    if (res.ok && data.ok) {
        showToast("Pack uploaded");
    } else {
        showToast(data.error || "Upload failed");
    }
}
</script>
</body>
</html>
